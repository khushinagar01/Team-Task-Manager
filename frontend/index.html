<!DOCTYPE html>
<html>
<head>
  <title>Team Task Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">

<!-- ERROR TOAST -->
<div id="errorBox"
  class="hidden fixed top-5 right-5 bg-red-500 text-white px-4 py-2 rounded shadow-lg z-50">
</div>

<!-- SUCCESS TOAST -->
<div id="successBox"
  class="hidden fixed top-5 right-5 bg-green-500 text-white px-4 py-2 rounded shadow-lg z-50">
</div>

<!-- 🎉 CONGRATULATIONS MODAL -->
<div id="congratsModal"
  class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50">
  <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center relative overflow-hidden">

    <!-- Confetti circles (pure CSS decoration) -->
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-yellow-400 via-pink-500 to-purple-500 rounded-t-3xl"></div>

    <div class="text-6xl mb-3 animate-bounce">🎉</div>
    <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">Congratulations!</h2>
    <p id="congratsMessage" class="text-gray-600 dark:text-gray-300 text-base mb-6"></p>

    <div class="flex gap-3 justify-center">
      <button onclick="closeCongratsModal()"
        class="bg-gradient-to-r from-green-400 to-emerald-500 text-white px-6 py-2 rounded-full font-semibold hover:from-green-500 hover:to-emerald-600 transition">
        Awesome! 🚀
      </button>
    </div>

    <!-- Sparkles -->
    <div class="mt-4 text-2xl tracking-widest">✨⭐✨</div>
  </div>
</div>

<!-- TOP BAR -->
<div class="flex justify-between items-center p-4 bg-white dark:bg-gray-800 shadow">
  <h1 class="text-xl font-bold text-gray-800 dark:text-white">🚀 Team Task Manager</h1>

  <div class="flex gap-2 items-center">
    <!-- Role Badge (shown after login) -->
    <span id="roleBadge" class="hidden px-3 py-1 rounded-full text-sm font-semibold"></span>
    <span id="userNameDisplay" class="hidden text-sm text-gray-600 dark:text-gray-300"></span>

    <button onclick="setLight()" class="px-3 py-1 bg-yellow-400 rounded hover:bg-yellow-500">
      ☀ Light
    </button>
    <button onclick="setDark()" class="px-3 py-1 bg-gray-800 text-white rounded hover:bg-black">
      🌙 Dark
    </button>
  </div>
</div>

<!-- AUTH -->
<div id="authBox" class="flex justify-center mt-10">
  <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow w-96">

    <div class="text-center mb-4">
      <button onclick="showLogin()" class="text-blue-500 font-semibold">Login</button> |
      <button onclick="showSignup()" class="text-green-500 font-semibold">Signup</button>
    </div>

    <!-- LOGIN -->
    <div id="loginBox">
      <h2 class="text-xl font-semibold mb-3 text-gray-800 dark:text-white">Login</h2>

      <input id="loginEmail" placeholder="Email"
        class="border p-2 w-full mb-3 rounded bg-white dark:bg-gray-700 text-black dark:text-white border-gray-300 dark:border-gray-600">

      <input id="loginPassword" type="password" placeholder="Password"
        class="border p-2 w-full mb-3 rounded bg-white dark:bg-gray-700 text-black dark:text-white border-gray-300 dark:border-gray-600">

      <button onclick="login()"
        class="bg-blue-500 text-white w-full p-2 rounded hover:bg-blue-600">
        Login
      </button>

      <p class="text-sm mt-3 text-center text-gray-600 dark:text-gray-300">
        New user?
        <span onclick="showSignup()" class="text-green-500 cursor-pointer font-semibold">
          Create account
        </span>
      </p>
    </div>

    <!-- SIGNUP -->
    <div id="signupBox" class="hidden">
      <h2 class="text-xl font-semibold mb-3 text-gray-800 dark:text-white">Signup</h2>

      <input id="name" placeholder="Name"
        class="border p-2 w-full mb-3 rounded bg-white dark:bg-gray-700 text-black dark:text-white border-gray-300 dark:border-gray-600">

      <input id="email" placeholder="Email"
        class="border p-2 w-full mb-3 rounded bg-white dark:bg-gray-700 text-black dark:text-white border-gray-300 dark:border-gray-600">

      <input id="password" type="password" placeholder="Password"
        class="border p-2 w-full mb-3 rounded bg-white dark:bg-gray-700 text-black dark:text-white border-gray-300 dark:border-gray-600">

      <!-- Role selector -->
      <select id="roleSelect"
        class="border p-2 w-full mb-3 rounded bg-white dark:bg-gray-700 text-black dark:text-white border-gray-300 dark:border-gray-600">
        <option value="member">Member</option>
        <option value="manager">Manager</option>
      </select>

      <button onclick="signup()"
        class="bg-green-500 text-white w-full p-2 rounded hover:bg-green-600">
        Signup
      </button>

      <p class="text-sm mt-3 text-center text-gray-600 dark:text-gray-300">
        Already registered?
        <span onclick="showLogin()" class="text-blue-500 cursor-pointer font-semibold">
          Login here
        </span>
      </p>
    </div>

  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden p-6">

  <button onclick="logout()"
    class="bg-red-500 text-white px-3 py-1 rounded mb-4 hover:bg-red-600">
    Logout
  </button>

  <!-- CARDS (grid adapts to role) -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

    <!-- CREATE PROJECT — Managers only -->
    <div id="createProjectCard" class="hidden bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-md hover:shadow-lg transition space-y-3">
      <h2 class="font-semibold text-gray-800 dark:text-white">📁 Create Project</h2>

      <input id="pname" placeholder="Project Name"
        class="border p-2 w-full rounded bg-white dark:bg-gray-700 text-black dark:text-white border-gray-300 dark:border-gray-600">

      <button onclick="createProject()"
        class="bg-green-500 text-white w-full p-2 rounded hover:bg-green-600">
        Create
      </button>
    </div>

    <!-- CREATE TASK — Managers only -->
    <div id="createTaskCard" class="hidden bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-md hover:shadow-lg transition space-y-3">
      <h2 class="font-semibold text-gray-800 dark:text-white">✅ Create Task</h2>

      <input id="title" placeholder="Task Title"
        class="border p-2 w-full rounded bg-white dark:bg-gray-700 text-black dark:text-white border-gray-300 dark:border-gray-600">

      <!-- Assign To now takes an email (must match the member's login email) -->
      <input id="assigned" placeholder="Assign To (member email)"
        class="border p-2 w-full rounded bg-white dark:bg-gray-700 text-black dark:text-white border-gray-300 dark:border-gray-600">

      <input id="projectId" placeholder="Project ID"
        class="border p-2 w-full rounded bg-white dark:bg-gray-700 text-black dark:text-white border-gray-300 dark:border-gray-600">

      <button onclick="createTask()"
        class="bg-purple-500 text-white w-full p-2 rounded hover:bg-purple-600">
        Add Task
      </button>
    </div>

    <!-- VIEW TASKS — Everyone -->
    <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-md hover:shadow-lg transition space-y-3">
      <h2 class="font-semibold text-gray-800 dark:text-white">🔍 View Tasks</h2>
      <p id="viewTasksHint" class="text-xs text-gray-500 dark:text-gray-400"></p>

      <input id="viewProjectId" placeholder="Project ID"
        class="border p-2 w-full rounded bg-white dark:bg-gray-700 text-black dark:text-white border-gray-300 dark:border-gray-600">

      <button onclick="getTasks()"
        class="bg-black text-white w-full p-2 rounded hover:bg-gray-700">
        Load
      </button>
    </div>

  </div>

  <!-- TASK LIST -->
  <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow">
    <h2 class="font-semibold mb-3 text-gray-800 dark:text-white">Tasks</h2>
    <ul id="taskList"></ul>
  </div>

</div>

<script>

const baseURL = "http://localhost:5000";

// DARK MODE
function setDark() { document.documentElement.classList.add("dark"); }
function setLight() { document.documentElement.classList.remove("dark"); }

// TOASTS
function showError(msg) {
  const box = document.getElementById("errorBox");
  box.innerText = msg;
  box.classList.remove("hidden");
  setTimeout(() => box.classList.add("hidden"), 3000);
}

function showSuccess(msg) {
  const box = document.getElementById("successBox");
  box.innerText = msg;
  box.classList.remove("hidden");
  setTimeout(() => box.classList.add("hidden"), 3000);
}

// TOKEN + USER HELPERS
function setSession(token, role, name, email) {
  localStorage.setItem("token", token);
  localStorage.setItem("role", role);
  localStorage.setItem("userName", name);
  localStorage.setItem("userEmail", email);
}

function getToken()     { return localStorage.getItem("token"); }
function getRole()      { return localStorage.getItem("role"); }
function getUserName()  { return localStorage.getItem("userName"); }
function getUserEmail() { return localStorage.getItem("userEmail"); }

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("role");
  localStorage.removeItem("userName");
  localStorage.removeItem("userEmail");
  location.reload();
}

// UI HELPERS
function showLogin() {
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("signupBox").style.display = "none";
}

function showSignup() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("signupBox").style.display = "block";
}

function authHeader() {
  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + getToken()
  };
}

// APPLY ROLE-BASED UI after login
function applyRoleUI() {
  const role = getRole();
  const name = getUserName();

  // Show role badge
  const badge = document.getElementById("roleBadge");
  const nameDisplay = document.getElementById("userNameDisplay");
  badge.classList.remove("hidden");
  nameDisplay.classList.remove("hidden");
  nameDisplay.innerText = "Hi, " + name;

  if (role === "manager") {
    badge.innerText = "👔 Manager";
    badge.className = "px-3 py-1 rounded-full text-sm font-semibold bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200";

    // Show manager-only cards
    document.getElementById("createProjectCard").classList.remove("hidden");
    document.getElementById("createTaskCard").classList.remove("hidden");

    document.getElementById("viewTasksHint").innerText = "You can see all tasks in this project.";
  } else {
    badge.innerText = "👤 Member";
    badge.className = "px-3 py-1 rounded-full text-sm font-semibold bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-200";

    // Members do NOT see create project / create task cards
    document.getElementById("createProjectCard").classList.add("hidden");
    document.getElementById("createTaskCard").classList.add("hidden");

    document.getElementById("viewTasksHint").innerText = "You can only see tasks assigned to you.";
  }
}

// CHECK LOGIN ON PAGE LOAD
if (getToken()) {
  document.getElementById("authBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  applyRoleUI();
}

// SIGNUP
async function signup() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("roleSelect").value;

  if (!name || !email || !password) {
    showError("All fields required");
    return;
  }

  const res = await fetch(baseURL + "/signup", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, password, role })
  });

  const data = await res.json();
  if (res.ok) {
    showSuccess("Signup successful! Please login.");
    showLogin();
  } else {
    showError(data.message || "Signup failed");
  }
}

// LOGIN
async function login() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  if (!email || !password) {
    showError("Email & password required");
    return;
  }

  const res = await fetch(baseURL + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    setSession(data.token, data.role, data.name, data.email);
    location.reload();
  } else {
    showError(data.message || "Invalid login");
  }
}

// CREATE PROJECT (Manager only — backend also enforces this)
async function createProject() {
  const pname = document.getElementById("pname").value;
  if (!pname) return showError("Project name required");

  const res = await fetch(baseURL + "/project", {
    method: "POST",
    headers: authHeader(),
    body: JSON.stringify({ name: pname })
  });

  const data = await res.json();
  if (res.ok) {
    showSuccess("Project created! ID: " + (data.projectId || ""));
  } else {
    showError(data.message || "Failed to create project");
  }
}

// CREATE TASK (Manager only — backend also enforces this)
async function createTask() {
  const title = document.getElementById("title").value;
  const assigned = document.getElementById("assigned").value;
  const projectId = document.getElementById("projectId").value;

  if (!title || !assigned || !projectId) {
    return showError("All fields required");
  }

  const res = await fetch(baseURL + "/task", {
    method: "POST",
    headers: authHeader(),
    body: JSON.stringify({ title, assignedTo: assigned, projectId })
  });

  const data = await res.json();
  if (res.ok) {
    showSuccess("Task created ✅");
    document.getElementById("title").value = "";
    document.getElementById("assigned").value = "";
  } else {
    showError(data.message || "Failed to create task");
  }
}

// GET TASKS
// Manager sees all; Member sees only their own (backend filters)
async function getTasks() {
  const viewProjectId = document.getElementById("viewProjectId").value;
  if (!viewProjectId) return showError("Enter a Project ID");

  const res = await fetch(baseURL + "/tasks/" + viewProjectId, {
    headers: authHeader()
  });

  const data = await res.json();
  const taskList = document.getElementById("taskList");
  taskList.innerHTML = "";

  if (!data.length) {
    taskList.innerHTML = "<li class='text-gray-500 dark:text-gray-400 text-sm'>No tasks found.</li>";
    return;
  }

  const role = getRole();

  data.forEach(t => {
    const li = document.createElement("li");
    li.className = "p-3 mb-2 border rounded flex justify-between items-center bg-white dark:bg-gray-800 text-black dark:text-white border-gray-300 dark:border-gray-700";

    const statusColor = t.status === "Done" ? "text-green-500" : t.status === "In Progress" ? "text-yellow-500" : "text-gray-500";

    // Status dropdown — always visible (members can change status of assigned tasks)
    const statusOptions = ["To Do", "In Progress", "Done"]
      .map(s => `<option value="${s}" ${t.status === s ? "selected" : ""}>${s}</option>`)
      .join("");

    li.innerHTML = `
      <div class="flex flex-col gap-1">
        <span class="font-medium">${t.title}</span>
        <span class="text-xs text-gray-400">Assigned to: ${t.assignedTo}</span>
        <span class="text-xs ${statusColor}">Status: ${t.status}</span>
      </div>
      <div class="flex items-center gap-2">
        <select onchange="updateStatus('${t._id}', this.value, '${viewProjectId}')"
          class="border rounded px-2 py-1 text-sm bg-white dark:bg-gray-700 text-black dark:text-white border-gray-300 dark:border-gray-600">
          ${statusOptions}
        </select>
      </div>
    `;

    taskList.appendChild(li);
  });
}

// UPDATE TASK STATUS
async function updateStatus(taskId, newStatus, projectId) {
  const res = await fetch(baseURL + "/task/" + taskId, {
    method: "PUT",
    headers: authHeader(),
    body: JSON.stringify({ status: newStatus })
  });

  const data = await res.json();
  if (res.ok) {
    // If the backend says the task was just completed, show the congrats modal
    if (data.taskCompleted) {
      document.getElementById("congratsMessage").innerText =
        `${data.memberName}, you completed the task "${data.taskTitle}"! Amazing work! 🌟`;
      document.getElementById("congratsModal").classList.remove("hidden");
    } else {
      showSuccess("Status updated ✅");
    }
    // Refresh the task list
    document.getElementById("viewProjectId").value = projectId;
    getTasks();
  } else {
    showError(data.message || "Failed to update task");
  }
}

// CLOSE CONGRATS MODAL
function closeCongratsModal() {
  document.getElementById("congratsModal").classList.add("hidden");
}

</script>

</body>
</html>
